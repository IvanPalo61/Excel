<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registrar movimientos bancarios</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #d7dde5;
      --line-strong: #a9b4c2;
      --primary: #1769aa;
      --primary-dark: #0f4f86;
      --danger: #b42318;
      --success: #057a55;
      --warning: #a15c00;
      font-family: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 22px;
    }

    .header-inner,
    main {
      width: min(1240px, calc(100% - 28px));
      margin: 0 auto;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    main {
      padding: 18px 0 26px;
      display: grid;
      gap: 14px;
    }

    .status {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      color: var(--muted);
      background: #f8fafc;
      font-size: 12px;
      white-space: nowrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .panel-body { padding: 16px; }

    .form-grid {
      display: grid;
      grid-template-columns: 0.7fr 0.7fr 1fr;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: #344054;
    }

    input {
      width: 100%;
      height: 39px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
      color: var(--text);
      background: #ffffff;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 105, 170, 0.14);
    }

    .file-box {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px dashed var(--line-strong);
      background: #f8fafc;
      border-radius: 8px;
      padding: 12px;
    }

    .file-name {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      height: 39px;
      border-radius: 6px;
      padding: 0 14px;
      border: 1px solid var(--line-strong);
      background: #ffffff;
      color: #344054;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .message {
      margin-top: 12px;
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 7px;
      padding: 11px 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .message.success {
      color: var(--success);
      background: #f0fdf7;
      border-color: rgba(5, 122, 85, 0.35);
    }

    .message.error {
      color: var(--danger);
      background: #fff4f2;
      border-color: rgba(180, 35, 24, 0.35);
    }

    .message.warning {
      color: var(--warning);
      background: #fff8eb;
      border-color: rgba(161, 92, 0, 0.35);
    }

    .hidden { display: none !important; }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      background: #ffffff;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 5px;
    }

    .metric-value {
      font-size: 16px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .text-output {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: #1f2933;
      padding: 12px;
      min-height: 120px;
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      max-height: 560px;
      margin-top: 12px;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: #eef2f6;
      color: #344054;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:nth-child(even) td { background: #fafbfc; }

    @media (max-width: 980px) {
      .form-grid,
      .summary {
        grid-template-columns: 1fr;
      }

      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .status { white-space: normal; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Registrar movimientos bancarios</h1>
      <div class="status" id="statusText">Listo</div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">Datos y archivo</h2>
      </div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="field">
            <label for="companyCode">cve_compania</label>
            <input id="companyCode" type="text" inputmode="numeric" placeholder="121">
          </div>

          <div class="field">
            <label for="bankCode">cve_banco</label>
            <input id="bankCode" type="text" placeholder="BBV">
          </div>

          <div class="field">
            <label for="bankAccount">num_cuenta_banco</label>
            <input id="bankAccount" type="text" inputmode="numeric" placeholder="407273014">
          </div>
        </div>

        <div class="file-box">
          <div class="file-name" id="fileName">Selecciona un archivo .xlsx o .xls</div>
          <input id="fileInput" type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel">
        </div>

        <div class="actions">
          <button class="btn-primary" id="submitButton" type="button">Registrar</button>
          <button id="clearButton" type="button">Limpiar</button>
        </div>

        <div class="message hidden" id="messageBox"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">Texto recibido</h2>
        <div class="status" id="rowCount">0 registros</div>
      </div>
      <div class="panel-body">
        <div class="summary">
          <div class="metric">
            <div class="metric-label">Compania</div>
            <div class="metric-value" id="companyPreview">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Banco</div>
            <div class="metric-value" id="bankPreview">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Cuenta</div>
            <div class="metric-value" id="accountPreview">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Archivo</div>
            <div class="metric-value" id="filePreview">-</div>
          </div>
        </div>

        <div id="textArea" class="text-output">Aqui se mostrara el texto que devuelva la Lambda.</div>
        <div id="dataArea"></div>
      </div>
    </section>
  </main>

  <script>
    const API_GATEWAY_URL = 'https://bw5jabpvjb.execute-api.us-east-1.amazonaws.com/implementacion/excel';

    const columns = [
      'folio',
      'cve_compania',
      'fecha_banco',
      'cve_banco',
      'num_cuenta',
      'sucursal',
      'cuenta_origen',
      'bnet',
      'practicaja',
      'ordenante',
      'cve_cliente',
      'autorizacion',
      'forma_pago',
      'cargo',
      'abono',
      'fecha_registro',
      'concepto',
      'departamento'
    ];

    const companyCode = document.getElementById('companyCode');
    const bankCode = document.getElementById('bankCode');
    const bankAccount = document.getElementById('bankAccount');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const submitButton = document.getElementById('submitButton');
    const clearButton = document.getElementById('clearButton');
    const messageBox = document.getElementById('messageBox');
    const statusText = document.getElementById('statusText');
    const rowCount = document.getElementById('rowCount');
    const textArea = document.getElementById('textArea');
    const dataArea = document.getElementById('dataArea');
    const companyPreview = document.getElementById('companyPreview');
    const bankPreview = document.getElementById('bankPreview');
    const accountPreview = document.getElementById('accountPreview');
    const filePreview = document.getElementById('filePreview');

    let selectedFile = null;

    function isExcelFile(file) {
      const name = String(file?.name || '').toLowerCase();
      const type = String(file?.type || '').toLowerCase();
      return name.endsWith('.xlsx') || name.endsWith('.xls') || type.includes('spreadsheet') || type.includes('excel');
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          resolve(result.includes(',') ? result.split(',').pop() : result);
        };
        reader.onerror = () => reject(reader.error || new Error('No se pudo leer el archivo'));
        reader.readAsDataURL(file);
      });
    }

    function setMessage(text, type = '') {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`.trim();
      messageBox.classList.remove('hidden');
    }

    function clearMessage() {
      messageBox.textContent = '';
      messageBox.className = 'message hidden';
    }

    function normalizeApiBody(raw) {
      let body;
      try {
        body = raw ? JSON.parse(raw) : {};
      } catch {
        return { ok: false, error: raw, raw };
      }

      if (body && typeof body.body === 'string') {
        try {
          return JSON.parse(body.body);
        } catch {
          return { ...body, nestedBody: body.body };
        }
      }

      return body || {};
    }

    function getSpecificCode(body, response) {
      return (
        body.codigo ||
        body.code ||
        body.errorCode ||
        body.error_code ||
        body.statusCode ||
        body.status ||
        body.errorType ||
        response?.status ||
        'SIN_CODIGO'
      );
    }

    function formatApiError(body, response, raw) {
      const code = getSpecificCode(body, response);
      const message = (
        body.errorMessage ||
        body.error ||
        body.message ||
        body.mensaje ||
        body.detail ||
        body.details ||
        body.nestedBody ||
        raw ||
        'Error desconocido'
      );

      const lines = [
        'Error registrando movimientos',
        `Codigo especifico: ${code}`,
        response ? `HTTP status: ${response.status} ${response.statusText || ''}`.trim() : '',
        `Mensaje: ${typeof message === 'string' ? message : JSON.stringify(message)}`
      ].filter(Boolean);

      if (body.db) lines.push(`Base: ${JSON.stringify(body.db, null, 2)}`);
      if (body.details) lines.push(`Detalles: ${JSON.stringify(body.details, null, 2)}`);
      if (raw && raw.length && raw !== body.error && raw !== body.message) {
        lines.push(`Respuesta cruda:\n${raw.slice(0, 3000)}`);
      }

      return lines.join('\n');
    }

    function formatClientFetchError(error, endpoint) {
      return [
        'Error registrando movimientos',
        'Codigo especifico: ERROR_CLIENTE_HTML',
        `Mensaje tecnico: ${error.message}`,
        '',
        `URL usada: ${endpoint || '(vacia)'}`,
        'El navegador no pudo leer respuesta del API.',
        'Revisa CORS, ruta POST /excel y deployment del stage.'
      ].join('\n');
    }

    function updatePreview() {
      companyPreview.textContent = companyCode.value.trim() || '-';
      bankPreview.textContent = bankCode.value.trim() || '-';
      accountPreview.textContent = bankAccount.value.trim() || '-';
      filePreview.textContent = selectedFile ? selectedFile.name : '-';
      fileName.textContent = selectedFile ? selectedFile.name : 'Selecciona un archivo .xlsx o .xls';
    }

    function renderText(body) {
      const chunks = Array.isArray(body.messageChunks) ? body.messageChunks : [];
      const text = body.message || chunks.join('\n\n') || 'La Lambda no devolvio texto.';
      textArea.textContent = text;
    }

    function renderRows(rows) {
      rowCount.textContent = `${rows.length} registro${rows.length === 1 ? '' : 's'}`;
      dataArea.textContent = '';

      if (!rows.length) return;

      const tableWrap = document.createElement('div');
      tableWrap.className = 'table-wrap';

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');

      const headRow = document.createElement('tr');
      columns.forEach((column) => {
        const th = document.createElement('th');
        th.textContent = column;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);

      rows.forEach((row) => {
        const tr = document.createElement('tr');
        columns.forEach((column) => {
          const td = document.createElement('td');
          td.textContent = row?.[column] ?? '';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      table.append(thead, tbody);
      tableWrap.appendChild(table);
      dataArea.appendChild(tableWrap);
    }

    async function buildPayload() {
      const cveCompania = companyCode.value.trim();
      const cveBanco = bankCode.value.trim();
      const numCuentaBanco = bankAccount.value.trim();

      return {
        action: 'registrar_excel',
        returnMode: 'registrar',
        registrar: true,
        processAllSheets: true,
        cve_compania: cveCompania,
        cve_banco: cveBanco,
        num_cuenta_banco: numCuentaBanco,
        files: [{
          fileName: selectedFile.name,
          mimeType: selectedFile.type || 'application/octet-stream',
          cve_compania: cveCompania,
          cve_banco: cveBanco,
          num_cuenta_banco: numCuentaBanco,
          contentBase64: await fileToBase64(selectedFile)
        }]
      };
    }

    async function submit() {
      clearMessage();
      const endpoint = API_GATEWAY_URL.trim();
      const cveCompania = companyCode.value.trim();
      const cveBanco = bankCode.value.trim();
      const numCuentaBanco = bankAccount.value.trim();

      if (!endpoint || endpoint === 'https://TU_API_GATEWAY_AQUI') {
        setMessage('Falta configurar API_GATEWAY_URL dentro del HTML.', 'error');
        return;
      }

      if (!cveCompania) {
        setMessage('Falta cve_compania.', 'error');
        companyCode.focus();
        return;
      }

      if (!cveBanco) {
        setMessage('Falta cve_banco.', 'error');
        bankCode.focus();
        return;
      }

      if (!numCuentaBanco) {
        setMessage('Falta num_cuenta_banco.', 'error');
        bankAccount.focus();
        return;
      }

      if (!selectedFile) {
        setMessage('Selecciona un archivo Excel.', 'error');
        fileInput.focus();
        return;
      }

      if (!isExcelFile(selectedFile)) {
        setMessage('El archivo seleccionado no parece ser Excel.', 'error');
        return;
      }

      submitButton.disabled = true;
      statusText.textContent = 'Registrando...';

      try {
        const payload = await buildPayload();
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          mode: 'cors',
          body: JSON.stringify(payload)
        });

        const raw = await response.text();
        const body = normalizeApiBody(raw);
        const rows = Array.isArray(body.rows) ? body.rows : [];

        renderText(body);
        renderRows(rows);

        if (!response.ok || body.ok === false) {
          setMessage(formatApiError(body, response, raw), 'error');
          statusText.textContent = `Error ${getSpecificCode(body, response)}`;
          return;
        }

        setMessage(
          `Registro completado.\nRegistros leidos: ${body.totalRows ?? rows.length}\nRegistros insertados: ${body.insertedRows ?? body.db?.insertedRows ?? rows.length}`,
          'success'
        );
        statusText.textContent = 'Registrado';
      } catch (error) {
        renderRows([]);
        setMessage(formatClientFetchError(error, endpoint), 'error');
        statusText.textContent = 'Error';
      } finally {
        submitButton.disabled = false;
      }
    }

    function clearAll() {
      selectedFile = null;
      fileInput.value = '';
      companyCode.value = '';
      bankCode.value = '';
      bankAccount.value = '';
      clearMessage();
      rowCount.textContent = '0 registros';
      textArea.textContent = 'Aqui se mostrara el texto que devuelva la Lambda.';
      dataArea.textContent = '';
      statusText.textContent = 'Listo';
      updatePreview();
    }

    fileInput.addEventListener('change', () => {
      selectedFile = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
      if (selectedFile && !isExcelFile(selectedFile)) {
        setMessage('El archivo seleccionado no parece ser Excel.', 'warning');
      } else {
        clearMessage();
      }
      updatePreview();
    });

    companyCode.addEventListener('input', updatePreview);
    bankCode.addEventListener('input', updatePreview);
    bankAccount.addEventListener('input', updatePreview);
    submitButton.addEventListener('click', submit);
    clearButton.addEventListener('click', clearAll);

    updatePreview();
  </script>
</body>
</html>
